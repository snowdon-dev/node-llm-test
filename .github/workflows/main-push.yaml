name: Main push actions

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test-and-build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Pre test checks
        run: npm run pretty:check

      - name: Run Jest tests
        run: npm run prod:test

      - run: mkdir -p coverage/site/badges/

      - name: Create Coverage Badges
        uses: jaywcjlove/coverage-badges-cli@998665f7962b1a3935ba8c3e786171a99436e5d1
        with:
          style: flat
          source: coverage/coverage-final.json
          output: coverage/site/badges/badges.svg
          jsonPath: totals.percent_covered

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/site/
          retention-days: 1

  deploy-pages:
    needs: test-and-build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage/site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-npm:
    needs: test-and-build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Pack npm package
        run: npm pack

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign package
        run: |
          FILE=$(ls *.tgz)
          echo "Signing $FILE"
          cosign sign-blob --yes $FILE > $FILE.sig

      - name: Generate provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "*.tgz"

      - name: Publish to npm
        run: npm publish --provenance --access public
      #  env:
      #    NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
